version: '3.8'
services:
  mysql-db:
    image: mysql:8.0
    container_name: student-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: studentdb

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - student-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: student-phpmyadmin
    platform: linux/amd64
    restart: always
    depends_on:
      - mysql-db

    environment:
      PMA_HOST: mysql-db
      MYSQL_ROOT_PASSWORD: root123

    ports:
      - "8081:80"

    networks:
      - student-network

  backend:
    build: ./backend
    container_name: student-backend

    restart: always

    depends_on:
      - mysql-db

    ports:
      - "8080:8080"

    networks:
      - student-network

  frontend:
    build: ./frontend
    container_name: student-frontend

    restart: always

    depends_on:
      - backend

    ports:
      - "3000:80"

    networks:
      - student-network

volumes:
  mysql-data:

networks:
  student-network: